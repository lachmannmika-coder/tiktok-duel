name: Taeglicher TikTok-Schnappschuss

on:
  schedule:
    # 06:00 UTC = 07:00 (Winter) / 08:00 (Sommer) Schweizer Zeit
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # erlaubt manuelles Ausloesen ueber den Actions-Tab

permissions:
  contents: write

concurrency:
  group: daily-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Zahlen ziehen
        run: node scripts/fetch.mjs

      - name: Schnappschuss committen
        run: |
          git config user.name "duell-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if [ -d assets/avatars ]; then git add assets/avatars/; fi
          if git diff --staged --quiet; then
            echo "Keine Aenderung."
          else
            git commit -m "Schnappschuss $(date -u +%Y-%m-%d)"
            git push
          fi
